<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140">
  <!--
    Harbour seal trail (Phoca vitulina), one tile, tiles left-to-right.
    Continuous belly drag down the middle; fore-flippers land in pairs either
    side (they row together). Six strides, sizes/angles vary down the trail.
    Rotate the element 90deg in CSS to run it vertically as a sidebar.
  -->
  <defs>
    <!-- belly drag: soft band, darkest along the centreline, no hard edge -->
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#3a3f3d" stop-opacity="0"/>
      <stop offset="0.16" stop-color="#3a3f3d" stop-opacity="0.14"/>
      <stop offset="0.5"  stop-color="#3a3f3d" stop-opacity="0.18"/>
      <stop offset="0.84" stop-color="#3a3f3d" stop-opacity="0.14"/>
      <stop offset="1"   stop-color="#3a3f3d" stop-opacity="0"/>
    </linearGradient>

    <!-- feather the drag's top and bottom only (vertical blur, no side bleed) -->
    <filter id="feather" x="-1%" y="-10%" width="102%" height="120%">
      <feGaussianBlur stdDeviation="0 1.5"/>
    </filter>

    <!-- scuff the whole trail so strokes read dragged-in-sand, not vector-clean -->
    <!-- region pinned to the tile + stitchTiles so the noise itself tiles,
         otherwise the displacement seams where one tile meets the next -->
    <filter id="scuff" filterUnits="userSpaceOnUse" x="0" y="0" width="540" height="140">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.05" numOctaves="2" seed="4" stitchTiles="stitch" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- one fore-flipper: five clawed gouges, darker at the front edge -->
    <g id="flipper" fill="none" stroke="#3a3f3d" stroke-linecap="round" stroke-width="1.3">
      <path opacity="0.9" d="M4 9 Q15 1 31 4"/>
      <path opacity="0.8" d="M3 11 Q15 4 30 6"/>
      <path opacity="0.7" d="M5 12 Q13 2 28 7"/>
      <path opacity="0.6" d="M3 12 Q16 7 27 9"/>
      <path opacity="0.5" d="M6 10 Q13 6 25 11"/>
    </g>

    <!-- same flipper with a toe missing: not every claw registers in sand -->
    <g id="flipper-worn" fill="none" stroke="#3a3f3d" stroke-linecap="round" stroke-width="1.3">
      <path opacity="0.9" d="M4 9 Q15 1 31 4"/>
      <path opacity="0.8" d="M3 11 Q15 4 30 6"/>
      <path opacity="0.7" d="M5 12 Q13 2 28 7"/>
      <path opacity="0.5" d="M6 10 Q13 6 25 11"/>
    </g>
  </defs>

  <g filter="url(#scuff)">
    <!-- the body drag, running the whole length -->
    <rect x="0" y="45" width="540" height="50" fill="url(#belly)" filter="url(#feather)"/>
    <path d="M0 70 C 90 67 180 73 270 70 C 360 67 450 73 540 70"
          fill="none" stroke="#3a3f3d" stroke-opacity="0.09" stroke-width="2.5" filter="url(#feather)"/>

    <!-- stride 1 -->
    <use href="#flipper-worn" transform="translate(19 27) rotate(1) scale(1.3)"/>
    <use href="#flipper-worn" transform="translate(20 112) rotate(-2) scale(1.3 -1.3)"/>
    <!-- stride 2 -->
    <use href="#flipper"      transform="translate(109 28) scale(1.25)"/>
    <use href="#flipper"      transform="translate(109 112) rotate(-1) scale(1.35 -1.35)"/>
    <!-- stride 3 -->
    <use href="#flipper-worn" transform="translate(199 32) rotate(4) scale(1.3)"/>
    <use href="#flipper-worn" transform="translate(200 112) rotate(3) scale(1.4 -1.4)"/>
    <!-- stride 4 -->
    <use href="#flipper"      transform="translate(296 28) rotate(1) scale(1.2)"/>
    <use href="#flipper-worn" transform="translate(295 108) rotate(4) scale(1.2 -1.2)"/>
    <!-- stride 5 -->
    <use href="#flipper-worn" transform="translate(382 30) rotate(4) scale(1.2)"/>
    <use href="#flipper"      transform="translate(381 111) rotate(1) scale(1.2 -1.2)"/>
    <!-- stride 6 -->
    <use href="#flipper"      transform="translate(478 29) rotate(3) scale(1.2)"/>
    <use href="#flipper"      transform="translate(479 108) rotate(-1) scale(1.2 -1.2)"/>
  </g>
</svg>
